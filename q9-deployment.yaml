apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthapp
  template:
    metadata:
      labels:
        app: healthapp
    spec:
      containers:
      - name: healthapp
        image: healthapp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: healthapp-service
spec:
  type: NodePort
  selector:
    app: healthapp
  ports:
  - port: 5000
    nodePort: 30003